services:
  bot:
    build:
      context: .
      args:
        NXAPI_GIT_REF: ${NXAPI_GIT_REF:-main}
    restart: unless-stopped
    env_file: .env
    environment:
      HOME: /data
      XDG_CACHE_HOME: /data/.cache
      XDG_CONFIG_HOME: /data/.config
      XDG_STATE_HOME: /data/.local/state
    volumes:
      - nxapi-data:/data

volumes:
  nxapi-data:
